<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piotrowska Z38</title>

<style>

#demo_piotrowska {
    color: red;
    font-size: 40px;
}

</style>

</head>

<body>

<div style="color:red; font-size:1cm; text-align:center;">
Piotrowska 
</div><br>

<div style="color:green; font-size:12mm;">
Pojęcie rozdzielczość ekranu/monitora oznacza liczbę pikseli wyświetlanych na ekranie monitora. ( 12mm )
</div><br>

<div style="color:blue; font-size:50px;">
Pojęcie szerokość/wysokość ekranu przeglądarki w pikselach oznacza aktualny rozmiar okna przeglądarki. ( 50px )
</div><br>

<p id="demo_piotrowska"></p>

<script>

    var w = window.innerWidth;
    var h = window.innerHeight;
    var x = document.getElementById("demo_piotrowska");

    x.innerHTML = "szerokość przeglądarki: " + w + ", wysokość: " + h + ".";

</script>

<script>

document.write("<br>Twoja rozdzielczość ekranu to: "
+ screen.width + " na " + screen.height);

</script>

<script>

if (screen.width < 800 || screen.height < 600)
{
    document.write("<br>Rozdzielczość ekranu powinna być większa niż 800x600");
}

</script>

</body>
</html>

<!-- Piotrowska Z38_JS -->
