<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Piotrowska Z39_JS</title>
</head>

<body>

<h1 style="color:green;">MENU</h1>
<h2 style="color:red;">1-CZERWONY</h2>
<h2 style="color:blue;">2-NIEBIESKI</h2>

<input type="button" name="piotrowska_ucznia" value="Oblicz" onclick="fun_pio()" />

<script>

function fun_pio()
{
    var x_pio = prompt("Podaj kolor", "");

    if (x_pio == 1 || x_pio.toLowerCase() == "czerwony")
    {
        document.write("<h1 style='color:red;'>wczytałeś kolor czerwony</h1><br>");
    }
    else if (x_pio == 2 || x_pio.toLowerCase() == "niebieski")
    {
        document.write("<h6 style='color:blue;'>wczytałeś kolor niebieski</h6><br>");
    }
}

</script>

<!-- Piotrowska Z39_JS -->

</body>
</html>
