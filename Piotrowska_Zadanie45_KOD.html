<body>

    <div style="color:red; font-size:40px;">

        <script language="JavaScript">

            let koniec_petli_pio = prompt("Podaj koniec pętli:", "");

            koniec_petli_pio = parseInt(koniec_petli_pio);

            for (let i_p = 2; i_p <= koniec_petli_pio; i_p++)
            {
                if (i_p % 2 == 0)
                {
                    document.write(i_p + "<br>");
                }
            }

        </script>

    </div>
