        <html>
<head>
    <meta charset="UTF-8">
    <title>Zadanie 53</title>
</head>

<body>

    <div style="color:black; font-size:20px;">

        <script language="JavaScript">

            let ile_razy_pio = prompt("ile razy powtórzyć=", "");
            let inicjaly_pio = prompt("podaj twoje inicjały=", "");

            ile_razy_pio = parseInt(ile_razy_pio);

            for (let i_pio = 1; i_pio <= ile_razy_pio; i_pio++)
            {
                for (let spacja_pio = 1; spacja_pio < i_pio; spacja_pio++)
                {
                    document.write("&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;");
                }

                document.write(i_pio + "_" + inicjaly_pio + "_" + i_pio + "<br>");
            }

        </script>

    </div>

</body>
</html>
    </textarea>
</body>
