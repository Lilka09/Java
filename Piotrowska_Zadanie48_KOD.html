<!DOCTYPE html>
<head>
    <META HTTP-EQUIV="content-type" CONTENT="text/html">
    <meta charset="utf-8">
</head>
<body>
    <textarea cols="120" rows="30">
        <!DOCTYPE html> 
            <head> 
             <title>Sprawdzenie danych Piotrowska </title> 
                <meta charset="utf-8"> 
            </head> 
<body>
<div style="color:red;font-size:50px;">
    <script language="JavaScript">
        do {
            var liczba1=prompt("wysokość=","");
            var h_pio=parseFloat(liczba1);
            }
        while ( h_pio<=0);
        do {
            var liczba1=prompt("podstawę=","");
            var a_pio=parseFloat(liczba1);
            }
        while(!( a_pio>0));
            var Pole=a_pio*h_pio/2;
        document.write("Pole="+Pole.toFixed(2)+" cm^2"+"<br>");
    </script>
</div>
</body>
</html>
