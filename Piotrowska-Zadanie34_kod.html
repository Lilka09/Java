<b>Pytanie 2: Instrukcja wyboru - schemat blokowy</b><br>
Schemat blokowy instrukcji wyboru polega na sprawdzeniu warunku. 
Jeżeli warunek jest prawdziwy, wykonywana jest określona instrukcja. 
Jeżeli warunek jest fałszywy, program przechodzi dalej.<br><br>

<b>Pytanie 3: Instrukcja alternatywy - składnia teoretyczna</b><br>

}<br>

}<br><br>

<b>Pytanie 4: Instrukcja alternatywy - schemat blokowy</b><br>
Schemat blokowy instrukcji alternatywy sprawdza warunek. 
Gdy warunek jest prawdziwy, wykonywana jest pierwsza instrukcja. 
Gdy warunek jest fałszywy, wykonywana jest instrukcja po else.<br><br>

<b>Pytanie 5: Operatory porównania</b><br>
<table border="1">
    <tr>
        <th>Operator</th>
        <th>Opis</th>
        <th>Przykład</th>
    </tr>
    <tr>
        <td>==</td>
        <td>jest równe</td>
        <td>2==3 wynik fałsz</td>
    </tr>
    <tr>
        <td>!=</td>
        <td>nie jest równe</td>
        <td>2!=3 wynik prawda</td>
    </tr>
    <tr>
        <td>&gt;</td>
        <td>jest większe</td>
        <td>25&gt;3 wynik prawda</td>
    </tr>
    <tr>
        <td>&lt;</td>
        <td>jest mniejsze</td>
        <td>2&lt;3 wynik prawda</td>
    </tr>
    <tr>
        <td>&gt;=</td>
        <td>większe lub równe</td>
        <td>25&gt;=3 wynik prawda</td>
    </tr>
    <tr>
        <td>&lt;=</td>
        <td>mniejsze lub równe</td>
        <td>2&lt;=3 wynik prawda</td>
    </tr>
</table><br>

<b>Pytanie 6: Uwaga do operatorów porównania</b><br>
Należy odróżnić:<br>
= oznacza przypisanie, np. a=5;<br>
== oznacza porównanie dwóch wartości.<br><br>
