<body>
<div style="color:red; font-size:50px;">
<script language=""JavaScript">
           var x = prompt("podaj liczbę x=", "");
           var a_dana_pio = parseFloat(x);
           document.write("czytana liczba x=" + a_dana_pio + "<br>");
           if (a_dana_pio > 0)
           { document.write("czytana liczba jest większa od 0" + "<br>");}
           if (a_dana_pio == 0) {document.write("czytana liczba jest równa 0" + "<br>");}
           if (a_dana_pio < 0)
           { document.write("czytana liczba jest mniejsza od 0" + "<br>");}
</script>
</div>
</body>
