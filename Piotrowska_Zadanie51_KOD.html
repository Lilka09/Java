    <!DOCTYPE html>

    <title>Zadanie 49</title>
</head>

<body>

    <div style="color:red; font-size:40px;">

        <script language="JavaScript">

            let n_pio = prompt("Podaj liczbę n:", "");
            n_pio = parseInt(n_pio);

            let silnia_pio = 1;

            if (n_pio == 0)
            {
                silnia_pio = 1;
            }
            else
            {
                for (let i_pio = 1; i_pio <= n_pio; i_pio++)
                {
                    silnia_pio = silnia_pio * i_pio;
                }
            }

            document.write("n = " + n_pio + "<br>");
            document.write(n_pio + "! = " + silnia_pio);

        </script>

    </div>

</body>
