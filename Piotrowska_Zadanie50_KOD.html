<body>
    <textarea cols="120" rows="30">
        <html>
    <body>
        <div style="color:red; font-size:50px;">

            <script language="JavaScript">
                suma_pio=0;
                for (i_p = 1; i_p <= 1000000; i_p++)
                {
                    suma_pio = suma_pio+1/ i_p;
                }
                document.write("Suma = " + suma_pio.toFixed(2) + "<br>");

            </script>

        </div>
    </body>
</html>
    </textarea>
